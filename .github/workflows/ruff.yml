name: Lint

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Check
        run: ruff check nails_agent/

      - name: Format
        run: ruff format --check nails_agent/
