name: CI

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check nails_agent/

      - name: Format check
        run: ruff format --check nails_agent/

      - name: Run tests
        run: pytest tests/ -v --asyncio-mode=auto

      - name: Check docs for executable code outside fenced blocks
        run: |
          python - <<'PY'
          from __future__ import annotations

          import re
          import sys
          from pathlib import Path

          root = Path("docs/develop")
          if not root.exists():
              print("docs/develop not found, skip")
              raise SystemExit(0)

          pattern = re.compile(
              r"^\s*(from\s+[\w\.]+\s+import\s+.+|import\s+[\w\.]+|def\s+\w+\s*\(|class\s+\w+\s*[:\(]|if\s+__name__\s*==\s*['\"]__main__['\"])"
          )

          violations: list[str] = []

          for path in root.rglob("*.md"):
              in_fence = False
              for line_no, line in enumerate(path.read_text(encoding="utf-8").splitlines(), start=1):
                  stripped = line.strip()
                  if stripped.startswith("```"):
                      in_fence = not in_fence
                      continue
                  if in_fence:
                      continue
                  if pattern.search(line):
                      violations.append(f"{path}:{line_no}: {line.strip()}")

          if violations:
              print("Found executable code in docs/develop outside fenced blocks:")
              for item in violations:
                  print(f"  {item}")
              raise SystemExit(1)

          print("docs/develop executable-code check passed")
          PY
